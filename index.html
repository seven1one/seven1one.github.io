<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Portfolio</title>
    <style>
        body { background-color: #0f1115; color: white; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: linear-gradient(145deg, #1e2229, #14171c);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 20px 20px 60px #08090b, -5px -5px 20px rgba(255,255,255,0.02);
        }
    </style>
</head>
<body class="p-8 md:p-20">
    <div class="max-w-5xl mx-auto">
        <div class="glass-card p-12 rounded-[2rem] mb-12">
            <span class="text-blue-500 font-mono tracking-widest text-xs uppercase">Full-Stack Developer</span>
            <h1 class="text-6xl font-black mt-4 leading-none">Building Digital<br><span class="opacity-40">Experiences with Depth.</span></h1>
            <p class="mt-8 text-gray-400 text-lg max-w-lg">글로벌 스탠다드에 맞춘 고성능 웹 솔루션을 설계합니다. 논리와 감각의 조화를 통해 사용자에게 가치를 전달합니다.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-8 rounded-3xl hover:translate-y-[-10px] transition-transform duration-500">
                <h3 class="text-2xl font-bold">Global FinTech Platform</h3>
                <p class="text-blue-400 mt-2 font-mono text-sm">React, Node.js, AWS</p>
            </div>
            <div class="glass-card p-8 rounded-3xl">
                <h3 class="text-xl font-bold mb-4">Core Values</h3>
                <div class="space-y-3">
                    <div class="flex items-center text-gray-400 font-medium">
                        <div class="w-2 h-2 bg-blue-500 mr-3"></div> Scalability
                    </div>
                    <div class="flex items-center text-gray-400 font-medium">
                        <div class="w-2 h-2 bg-blue-500 mr-3"></div> User-Centric Design
                    </div>
                    <div class="flex items-center text-gray-400 font-medium">
                        <div class="w-2 h-2 bg-blue-500 mr-3"></div> Code Integrity
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
